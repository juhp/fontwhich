name: build
on:
  push:
    branches: [ haskell ]
  pull_request:
    branches: [ haskell ]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ghc: ['9.12', '9.10', '9.8', '9.6', '9.4', '9.2']
    name: Haskell GHC ${{ matrix.ghc }}
    steps:
      - uses: actions/checkout@v5
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cabal
            dist-newstyle
          key: ${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('**/*.cabal','**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.ghc }}-
            ${{ runner.os }}-
      - run: sudo apt-get -y install libcairo2-dev libpango1.0-dev libgirepository1.0-dev
      - run: cabal update
      - run: cabal build
      - run: cabal sdist
